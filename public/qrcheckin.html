<!DOCTYPE html>
<html>
  <head>
    <title>QR Check-In</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page-background">
    <div class="top-bar">
       <div class="logo-title" onclick="window.location.href='tourist.html'" style="cursor:pointer;">
       <img src="images/logo.png" class="logo" />
      <h1>QR Check-In</h1>
      </div>

      <div class="top-right">
        <button onclick="goBack()">Back</button>
        <button onclick="goHome()">Home</button>
        <button onclick="goToVisitPage()">Record Visit</button>
        <button onclick="goToMyVisitsPage()">My Visits</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

     <section class="qr-page">
      <div class="qr-card">
        <h2>Scan Destination QR Code</h2>
        <p class="qr-subtext">
          Allow camera access and scan the QR code at the destination.
        </p>

        <div class="qr-actions">
          <button id="startScannerBtn">Open Camera</button>
          <button id="stopScannerBtn" type="button">Stop Camera</button>
        </div>

        <div id="reader"></div>

    <div style="text-align:center; margin-top:50px;">
    <h2>Scan QR Code</h2>


    <p id="qrMessage" class="qr-message"></p>
  </div>

    <script src="https://unpkg.com/html5-qrcode" defer></script>
    <script src="qrcheckin.js" defer></script>
  </body>
</html>
