<!DOCTYPE html>
<html>
  <head>
    <title>Record Visit</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page-background">

    <div class="top-bar">
       <div class="logo-title" onclick="window.location.href='tourist.html'" style="cursor:pointer;">
        <img src="images/logo.png" class="logo" />
      <h1>Record a Visit</h1>
      </div>

      <div class="top-right">
        <button onclick="goBack()">Back</button>
        <button onclick="goHome()">Home</button>
        <button onclick="goToQRPage()">QR Check-In</button>
        <button onclick="goToMyVisitsPage()">My Visits</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

   <div class="visit-container">
  <h2>Submit Your Visit</h2>

  <form id="visitForm">
    <label for="destinationId">Destination:</label>
    <select id="destinationId" required></select>

    <label for="rating">Rating (1-5):</label>
    <input type="number" id="rating" min="1" max="5" required />

    <label for="cleanliness">Cleanliness of the attraction:</label>
    <select id="cleanliness" required>
      <option value="">Select</option>
      <option value="Excellent">Excellent</option>
      <option value="Good">Good</option>
      <option value="Fair">Fair</option>
      <option value="Poor">Poor</option>
    </select>

    <label for="safety">Did you feel safe during your visit?</label>
    <select id="safety" required>
      <option value="">Select</option>
      <option value="Yes">Yes</option>
      <option value="Somewhat">Somewhat</option>
      <option value="No">No</option>
    </select>

    <label for="accessibility">Accessibility (transport, signage, ease of entry):</label>
    <select id="accessibility" required>
      <option value="">Select</option>
      <option value="Very Accessible">Very Accessible</option>
      <option value="Moderately Accessible">Moderately Accessible</option>
      <option value="Not Accessible">Not Accessible</option>
    </select>

    <label for="staff">Staff service quality (if applicable):</label>
    <select id="staff" required>
     <option value="">Select</option>
     <option value="Excellent">Excellent</option>
     <option value="Good">Good</option>
     <option value="Poor">Poor</option>
     <option value="Not Applicable">Not Applicable</option>
   </select>

   <label for="value">Was the experience worth the cost?</label>
   <select id="value" required>
    <option value="">Select</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
   </select>

  <label for="recommend">Would you recommend this attraction?</label>
  <select id="recommend" required>
    <option value="">Select</option>
    <option value="Yes">Yes</option>
    <option value="No">No</option>
</select>

  <label for="comment">Comment:</label>
  <input type="text" id="comment" />

  <button type="submit">Submit Visit</button>
 </form>

  <p id="message"></p>
</div>

    <script src="visit.js"></script>
  </body>
</html>
