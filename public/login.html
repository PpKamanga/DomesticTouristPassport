<!DOCTYPE html>
<html>
  <head>
    <title>Login - Domestic Tourist Passport</title>
    <link rel="stylesheet" href="style.css" />
  </head>
<body>
  <div class="login-banner">
    <img src="images/logo.png" alt="Domestic Tourist Passport Logo" class="site-logo">
    <div class="banner-text">
      <h1>Domestic Tourist Passport</h1>
      <p>Explore destinations. Record visits. Earn footprints.</p>
    </div>
  </div>

    <div class="login-container">
    <h2>Login</h2>
    
    <form id="loginForm">
      <label for="email">Email:</label>
      <input type="email" id="email" required />

      <label for="password">Password:</label>
      <input type="password" id="password" required />


      <button type="submit">Login</button>
    </form>

    <p style="text-align: center; margin-top: 10px;">
  Don’t have an account? <a href="register.html">Create one here</a>
</p>

    <p id="loginMessage"></p>

    <script src="login.js"></script>
  </body>
</html>
