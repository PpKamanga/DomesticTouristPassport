<!DOCTYPE html>
<html>
  <head>
    <title>Destination Details</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="top-bar">
        <div class="logo-title" onclick="window.location.href='tourist.html'" style="cursor:pointer;">
          <img src="images/logo.png" class="logo" />
          <h1>Destination Details</h1>
        </div>

      <div class="top-right">
        <button onclick="goBack()">Back</button>
        <button onclick="goHome()">Home</button>
        <button onclick="goToQRPage()">QR Check-In</button>
        <button onclick="goToMyVisitsPage()">My Visits</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="destination-card-page">
      <div class="destination-card">
        <img id="image" class="hero-image" src="" alt="Destination Image" />
          <h2 id="name"></h2>
          <p id="city"></p>
          <p id="description"></p>
        
      
        <button id="recordVisitBtn">Record Visit</button>
      </div>
    </div>

    <script src="destination-details.js"></script>
  </body>
</html>
