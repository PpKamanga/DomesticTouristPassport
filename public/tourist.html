<!DOCTYPE html>
<html>
  <head>
    <title>Tourist Dashboard - Domestic Tourist Passport</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
   <div class="top-bar">
     <div class="logo-title" onclick="window.location.href='tourist.html'" style="cursor:pointer;">
       <img src="images/logo.png" alt="Logo" class="logo" />
       <h1>Domestic Tourist Passport</h1>
     </div>

 <div class="top-right">
  <p id="userInfo"></p>
  <button onclick="goToVisitPage()">Record Visit</button>
  <button onclick="goToMyVisitsPage()">My Visits</button>
  <button onclick="goHome()">Home</button>
  <button onclick="goBack()">Back</button>
  <button onclick="goToQRPage()">QR Check-In</button>
  <button onclick="logout()">Logout</button>
</div>
</div>

<div class="dashboard-summary">
  <h2>Check out our list of eligible tourist attractions!</h2>
  <p>Explore attractions, record visits, and earn footprints.</p>
</div>

  <section class="attractions-section">
   <div class="section-header">
  </div>

  <div class="attractions-grid" id="destinations"></div>
</section>

<section class="visits-section" id="visitsSection" style="display: none;">
  <div class="section-header">
    <h2>My Visits</h2>
  </div>

  <div id="visitsList"></div>
</section>


    <script src="tourist.js"></script>
  </body>
</html>
